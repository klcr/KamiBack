name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check domain/ api/

      - name: Format check
        run: ruff format --check domain/ api/

      - name: Type check
        run: mypy domain/src api/src

      - name: Test
        run: pytest domain/ api/ -v

      - name: Dependency check
        run: lint-imports

  web:
    name: Web (biome + typecheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm ci || npm install

      - name: Biome check
        working-directory: web
        run: npx biome check ./src
