name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check domain/ api/

      - name: Format check
        run: ruff format --check domain/ api/

      - name: Type check
        run: mypy domain/src api/src

      - name: Test
        run: pytest domain/ api/ -v

      - name: Dependency check
        run: lint-imports

  python-smoke:
    name: Python (API smoke test)
    runs-on: ubuntu-latest
    needs: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: API smoke test
        run: |
          if [ -f api/src/main.py ]; then
            cd api
            uvicorn src.main:app --host 127.0.0.1 --port 8000 &
            SERVER_PID=$!
            sleep 3
            curl --fail --silent --max-time 5 http://127.0.0.1:8000/docs > /dev/null \
              && echo "API smoke test passed" \
              || (echo "API smoke test failed"; kill $SERVER_PID 2>/dev/null; exit 1)
            kill $SERVER_PID 2>/dev/null
          else
            echo "api/src/main.py not found — skipping smoke test"
          fi

  web:
    name: Web (biome + typecheck + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm ci || npm install

      - name: Biome check
        working-directory: web
        run: npx biome check ./src

      - name: Type check
        working-directory: web
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "tsconfig.json not found — skipping type check"
          fi

      - name: Test
        working-directory: web
        run: |
          if npx vitest --help > /dev/null 2>&1; then
            npx vitest run
          else
            echo "vitest not installed — skipping tests"
          fi
